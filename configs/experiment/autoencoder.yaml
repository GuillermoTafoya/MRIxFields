seed: 13
data:
  name: nifti_manifest
  root: ${MRIXFIELDS_DATA_ROOT}
  manifest: ${MRIXFIELDS_MANIFEST}
  num_samples: 4
  volume_shape: [1, 16, 16, 16]
model:
  name: cnn_autoencoder
  variant: cnn3d
  spatial_dims: 3
  in_channels: 1
  out_channels: 1
  hidden_channels: [8, 16]
  latent_channels: 16
  activation: silu
  final_activation: null
  translator:
    name: identity
training:
  stage: autoencoder
  steps: 1000
  batch_size: 1
  lr: 0.0002
  device: auto
  precision: fp32
  gradient_checkpointing: false
  loss_weights:
    reconstruction: 1.0
    transport_cost: 0.0
    cycle: 0.0
    identity: 0.0
  checkpoint_dir: outputs/autoencoder/checkpoints
  checkpoint_every_steps: 100
  checkpoint_at_end: true
  log_every_steps: 1
  resume_from: null
