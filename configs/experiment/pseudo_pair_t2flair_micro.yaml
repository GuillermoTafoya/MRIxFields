seed: 13

data:
  name: pseudo_pair_slices
  # Override with --manifest or set MRIXFIELDS_MANIFEST outside the repo.
  manifest: ${MRIXFIELDS_MANIFEST}
  sequence: T2FLAIR
  source_field: 0.1
  target_fields: [1.5, 3.0, 5.0, 7.0]
  train_volumes_per_field: 2
  val_volumes_per_field: 1
  test_volumes_per_field: 1
  max_pilot_records: null
  cache_size: 2
  split_json: outputs/pseudo_pair_t2flair_micro/volume_splits.json
  preprocessing:
    slice_start: 72
    slice_end: 292
    slices_per_volume: 8
    normalization: official_01
    model_range: minus_one_one
    resize_mode: fit_pad
    output_height: 128
    output_width: 160
    slice_axis: z

model:
  name: conditional_unet_field_translator
  in_channels: 1
  out_channels: 1
  hidden_channels: [16, 32]
  latent_channels: 64
  cond_dim: 64
  spatial_dims: 2
  upsample_mode: interpolate
  skip_mode: gated
  final_activation: tanh
  pad_to_multiple: true

training:
  epochs: 1
  batch_size: 4
  num_workers: 0
  lr: 0.0001
  weight_decay: 0.01
  amp: true
  grad_clip_norm: 1.0
  scheduler:
    name: none
  checkpoint_dir: outputs/pseudo_pair_t2flair_micro/checkpoints
  checkpoint_max_bytes: 200000000
  resume_from: null
  log_every_steps: 1
  loss_weights:
    masked_l1: 1.0
    gradient: 0.2
    background: 0.5

evaluation:
  lpips: auto
  # Frozen before the micro-v2 run. These are exploratory viability gates only;
  # failure is valid negative evidence and does not authorize post-hoc changes.
  evidence_scope: sampled_slice_per_volume_exploratory
  evaluation_after_epoch: 2
  min_macro_relative_nrmse_improvement: 0.02
  min_macro_absolute_ssim_improvement: 0.005
  min_fields_with_nrmse_improvement: 3
  min_fraction_volumes_correct_best_nrmse: 0.50
  min_mean_margin_vs_best_wrong_nrmse: 0.001
  min_relative_correct_vs_wrong_nrmse_improvement: 0.01
  min_relative_correct_vs_permuted_nrmse_improvement: 0.005
  max_macro_outside_mask_mean_abs: 0.05

# Expected training count:
# 4 fields * 2 train volumes/field * 8 slices/volume = 64 train examples
# 64 train examples / batch size 4 = 16 optimizer steps for epoch 1
