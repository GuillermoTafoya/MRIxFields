seed: 13
data:
  name: nifti_manifest
  root: ${MRIXFIELDS_DATA_ROOT}
  manifest: ${MRIXFIELDS_MANIFEST}
  # Real volumes are full 3D (e.g. 364x436x364) — decoding back toward full resolution
  # with latent_channels=128 allocates tens of GB per intermediate activation otherwise
  # (confirmed: a single up-sampling conv tried to allocate ~14.7GB at full res). Random
  # patch cropping (see data/transforms.py:random_crop) is required, not optional, at
  # this scale. Must match stage2_diffuser.yaml's patch_size (same encoder is reused).
  patch_size: [64, 64, 64]
model:
  name: kl_vae
  in_channels: 1
  base_channels: 32
  # latent_channels=4 at /4 spatial => 16x compression on a 64^3 patch (16^3*4 vs 64^3).
  # The old 128 was a *2x expansion* (no bottleneck), which OOM'd eval and left nothing
  # useful for the stage-2 diffuser. 4 channels is the medical-3D consensus (SD kl-f8: 4;
  # Pinaya brain LDM / MONAI: 3), /4 spatial chosen over /8 for anatomical fidelity
  # (Medical Diffusion: /8 loses fine detail). Must match stage2_diffuser.yaml.
  latent_channels: 4
  # Residual blocks per resolution level (MONAI AutoencoderKL-style capacity). The old
  # single-conv-per-level encoder had too low a reconstruction ceiling.
  num_res_blocks: 2
  # Full 3D volumes (matching the real manifest's NIfTI files and the CNN autoencoder's
  # already-proven 3D path) — no slice-extraction step exists in this pipeline, and
  # compute cost was explicitly waved off. Reverses fase-b-vae.md's original "2D
  # estricto" rule for this component; confirmed with Simón 2026-07-03.
  spatial_dims: 3
  activation: silu
training:
  steps: 1000
  batch_size: 8
  lr: 0.0001
  # 'cuda' (not 'auto'): fail-fast at step 0 if no GPU, instead of silently falling back
  # to CPU and burning hours (the previous run trained on CPU without noticing).
  device: cuda
  precision: bf16
  # Number of DataLoader workers for the real-manifest training path (NIfTI decode is I/O
  # bound). 0 keeps it single-process for debugging.
  num_workers: 2
  loss_weights:
    # Full SSIM+nRMSE+LPIPS+KL recipe now runs in 3D: ssim_loss dispatches to ssim3d
    # (avg_pool3d) and lpips uses the slice-averaged variant (lpips_num_slices below).
    ssim: 1.0
    nrmse: 1.0
    lpips: 1.0
    kl: 0.0001
  ssim_window_size: 7
  # Slices sampled along depth for the slice-based 3D LPIPS term.
  lpips_num_slices: 8
  # Gradient-norm clip: bounds each update so an occasional large-gradient batch (e.g. a
  # KL/logvar spike on a near-empty background patch) can't send the loss diverging.
  # Standard VAE stabilizer; 0 disables.
  grad_clip_norm: 1.0
  warm_start_checkpoint: null
  checkpoint_dir: outputs/stage1_vae/checkpoints
  checkpoint_every_steps: 100
  checkpoint_at_end: true
  # 128 latent channels can exceed save_checkpoint's 10MB default guardrail once
  # base_channels is sized for real use — raised explicitly here rather than letting a
  # real run die on a checkpoint-size ValueError after GPU time.
  checkpoint_max_bytes: 200000000
  log_every_steps: 1
  resume_from: null
