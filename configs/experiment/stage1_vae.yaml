seed: 13
data:
  name: nifti_manifest
  root: ${MRIXFIELDS_DATA_ROOT}
  manifest: ${MRIXFIELDS_MANIFEST}
  # Real volumes are full 3D (e.g. 364x436x364) — decoding back toward full resolution
  # with latent_channels=128 allocates tens of GB per intermediate activation otherwise
  # (confirmed: a single up-sampling conv tried to allocate ~14.7GB at full res). Random
  # patch cropping (see data/transforms.py:random_crop) is required, not optional, at
  # this scale. Must match stage2_diffuser.yaml's patch_size (same encoder is reused).
  patch_size: [64, 64, 64]
  # Random patches drawn per volume per pass (StreamingPatchDataset). Each volume is
  # read+decoded+normalized from disk once and this many 64^3 patches are drawn before it
  # is dropped, amortizing that single ~231MB read (the old per-patch full-volume re-read
  # starved the GPU on Drive-FUSE). The manifest is far larger than RAM, so volumes are
  # streamed (one resident at a time), not cached.
  patches_per_volume: 16
  # Voxel intensity above which a voxel counts as brain. Official volumes are [0, 1] with
  # background at exactly 0, so `> 0` is the mask.
  foreground_threshold: 0.0
  # Stratified patch sampling. Uniform random 64^3 crops on a 364x436x364 volume land
  # >2/3 of the time on near-empty air (measured by simulation), so most of the compute
  # reconstructed background and the loss plateau was dominated by trivially-easy patches.
  # Brain-only cropping is NOT the fix: the challenge metrics score the whole volume, so
  # the model must still learn air and the brain/air boundary. These are relative weights
  # over the three strata — starting points to sweep, not derived constants.
  stratified_crop:
    foreground: 0.7
    border: 0.2
    air: 0.1
    min_foreground_fraction: 0.1
    max_attempts: 50
model:
  name: kl_vae
  in_channels: 1
  base_channels: 32
  # latent_channels=4 at /4 spatial => 16x compression on a 64^3 patch (16^3*4 vs 64^3).
  # The old 128 was a *2x expansion* (no bottleneck), which OOM'd eval and left nothing
  # useful for the stage-2 diffuser. 4 channels is the medical-3D consensus (SD kl-f8: 4;
  # Pinaya brain LDM / MONAI: 3), /4 spatial chosen over /8 for anatomical fidelity
  # (Medical Diffusion: /8 loses fine detail). Must match stage2_diffuser.yaml.
  latent_channels: 4
  # Residual blocks per resolution level (MONAI AutoencoderKL-style capacity). The old
  # single-conv-per-level encoder had too low a reconstruction ceiling.
  num_res_blocks: 2
  # Full 3D volumes (matching the real manifest's NIfTI files and the CNN autoencoder's
  # already-proven 3D path) — no slice-extraction step exists in this pipeline, and
  # compute cost was explicitly waved off. Reverses fase-b-vae.md's original "2D
  # estricto" rule for this component; confirmed with Simón 2026-07-03.
  spatial_dims: 3
  activation: silu
training:
  steps: 1000
  batch_size: 8
  lr: 0.0001
  # 'cuda' (not 'auto'): fail-fast at step 0 if no GPU, instead of silently falling back
  # to CPU and burning hours (the previous run trained on CPU without noticing).
  device: cuda
  precision: bf16
  # 0 (single process): a single reader hits Drive sequentially, which avoids Drive-FUSE's
  # concurrent-read crashes (OSError 107) seen with >0 workers. StreamingPatchDataset owns
  # its own shuffling, so DataLoader shuffle is off regardless.
  num_workers: 0
  loss_weights:
    # Full L1+SSIM+nRMSE+LPIPS+KL recipe in 3D: ssim_loss dispatches to ssim3d (avg_pool3d)
    # and lpips uses the slice-averaged variant (lpips_num_slices below). L1 is the flat
    # absolute-intensity anchor (see stage1_vae.py:DEFAULT_VAE_LOSS_WEIGHTS) — the term the
    # earlier run lacked, which left the background floating instead of at 0. Weight to be
    # swept alongside the others.
    l1: 1.0
    ssim: 1.0
    nrmse: 1.0
    lpips: 1.0
    kl: 0.0001
  ssim_window_size: 7
  # Must equal evaluation/stage1_report.py's _DATA_RANGE (1.0 on the official [0, 1]
  # contract). Previously left at the loss default of 1.0 while eval used 2.0, so the
  # optimized SSIM and the reported SSIM were different functions.
  data_range: 1.0
  # Slices sampled along depth for the slice-based 3D LPIPS term.
  lpips_num_slices: 8
  # Gradient-norm clip: bounds each update so an occasional large-gradient batch (e.g. a
  # KL/logvar spike on a near-empty background patch) can't send the loss diverging.
  # Standard VAE stabilizer; 0 disables.
  grad_clip_norm: 1.0
  # Early stopping on an EMA of the (noisy) per-step training loss, checked once per
  # checkpoint. Safety net against burning GPU-hours on a plateaued run — NOT a precise
  # convergence detector (training loss can flatten while the model still improves).
  # State persists in the checkpoint so resume_from continues the patience count.
  early_stopping: true
  early_stopping_patience: 5      # checkpoints (= 5 * checkpoint_every_steps) w/o improvement
  early_stopping_min_delta: 0.005 # relative EMA improvement (0.5%) that counts as progress
  early_stopping_ema_decay: 0.98  # EMA smoothing (~50-step effective window)
  warm_start_checkpoint: null
  checkpoint_dir: outputs/stage1_vae/checkpoints
  checkpoint_every_steps: 2000
  checkpoint_at_end: true
  # 128 latent channels can exceed save_checkpoint's 10MB default guardrail once
  # base_channels is sized for real use — raised explicitly here rather than letting a
  # real run die on a checkpoint-size ValueError after GPU time.
  checkpoint_max_bytes: 200000000
  log_every_steps: 1
  resume_from: null
