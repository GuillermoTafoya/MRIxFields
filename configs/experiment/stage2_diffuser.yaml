seed: 13
data:
  name: nifti_manifest
  root: ${MRIXFIELDS_DATA_ROOT}
  manifest: ${MRIXFIELDS_MANIFEST}
  # Must match stage1_vae.yaml's patch_size — same reasoning (full 3D volumes OOM at full
  # resolution; see data/transforms.py:random_crop).
  patch_size: [64, 64, 64]
  # See stage1_vae.yaml — StreamingPatchDataset reads each volume once per pass and draws
  # this many random patches from it before dropping it, amortizing Drive I/O.
  patches_per_volume: 16
model:
  name: field_conditioned_unet
  # Diffuser in/out channels == VAE latent_channels. Must match stage1_vae.yaml (4).
  latent_channels: 4
  base_channels: 128
  # Must match KLVAEEncoder's spatial_dims below (the diffuser operates on that
  # encoder's latent grid) — see kl_vae.py / denoising_unet.py docstrings for why 3D.
  spatial_dims: 3
  num_levels: 1
  num_blocks_per_level: 2
  timestep_embedding_dim: 64
  field_conditioning_dim: 32
  activation: silu
# Must match the encoder architecture of the checkpoint referenced by
# training.vae_checkpoint below (see configs/model/kl_vae.yaml) — used to construct a
# KLVAEEncoder before loading its trained state dict.
vae_model:
  in_channels: 1
  base_channels: 32
  latent_channels: 4
  num_res_blocks: 2
  spatial_dims: 3
  activation: silu
training:
  steps: 1000
  batch_size: 8
  lr: 0.0001
  device: auto
  precision: bf16
  num_timesteps: 100
  beta_start: 0.0001
  beta_end: 0.02
  train_vae_jointly: false
  vae_checkpoint: null
  checkpoint_dir: outputs/stage2_diffuser/checkpoints
  checkpoint_every_steps: 100
  checkpoint_at_end: true
  checkpoint_max_bytes: 200000000
  log_every_steps: 1
  resume_from: null
